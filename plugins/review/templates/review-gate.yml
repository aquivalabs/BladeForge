name: review-gate
on:
  pull_request:
jobs:
  review-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Secret scan (deterministic review gate)
        # Self-contained: fetch + run the latest published harness; not tied to any repo scripts.
        run: npx -y -p bladeforge-review-harness@latest review-gate --base origin/main --secrets-only
