purpose: Refresh an existing skill's metadata.yaml after its body, tools, scripts, or hooks changed, by re-interviewing the non-derivable fields.
best-for: Any marketplace using metadata.yaml sidecars, to keep a skill's changes/purpose accurate after it is edited.
